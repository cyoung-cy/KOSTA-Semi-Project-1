movie.insert=INSERT INTO MOVIE_TEST (MOVIE_ID, MOVIE_TITLE, ACTOR, RELEASE_DATE, GENRE, SCREENING_TIME, DIRECTOR, AUDI_ACC) VALUES (?, ?, ?, ?, ?, ?, ?, ?)
movie.update.is_screening=UPDATE MOVIE_TEST SET IS_SCREENING = TRUE WHERE MOVIE_ID = ?
movie.insert.upcoming=INSERT INTO MOVIE_TEST (MOVIE_ID, MOVIE_TITLE, ACTOR, RELEASE_DATE, GENRE, SCREENING_TIME, DIRECTOR, IS_SCREENING, AUDI_ACC) VALUES (?, ?, ?, ?, ?, ?, ?, TRUE, 0)